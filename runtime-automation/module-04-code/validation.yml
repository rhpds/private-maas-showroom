---
- name: Module 4 Validation — Game Time
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    model_internal_url: "https://nemotron-3-nano-30b-a3b-kserve-workload-svc.llm.svc.cluster.local:8000"
  tasks:
    # -------------------------------------------------------
    # Check 1 — Model endpoint reachable
    # -------------------------------------------------------
    - name: Check Task 1 — nemotron model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Check 2 — Chat completion works (proves Continue can function)
    # -------------------------------------------------------
    - name: Check Task 2 — chat completion works
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/chat/completions"
        method: POST
        headers:
          Content-Type: application/json
        body_format: json
        body:
          model: "nemotron-3-nano-30b-a3b"
          messages:
            - role: user
              content: "Write a one-line Python hello world."
          max_tokens: 30
        return_content: true
        validate_certs: false
        timeout: 30
      register: r_chat_test
      ignore_errors: true

    # -------------------------------------------------------
    # Build results
    # -------------------------------------------------------
    - name: Build task results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_model_endpoint.status | default(0) == 200 }}"
        _task2_ok: "{{ r_chat_test.status | default(0) == 200 }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok }}"
        pass_msg: |
          ✅ Task 1: Model endpoint nemotron-3-nano-30b-a3b is reachable
          ✅ Task 2: Chat completion is working (Continue can assist with coding)
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Task 1: Model endpoint nemotron-3-nano-30b-a3b {{ 'is reachable' if _task1_ok else 'is NOT reachable — contact cluster admin' }}
          {{ '✅' if _task2_ok else '❌' }} Task 2: Chat completion {{ 'is working' if _task2_ok else 'failed — model may be down' }}
