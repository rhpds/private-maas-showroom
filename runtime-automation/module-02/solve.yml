---
- name: Module 2 Solve — Introduction to your environment
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Verify qwen model service exists in llm namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: v1
        kind: Service
        name: qwen3-4b-instruct-kserve-workload-svc
        namespace: llm
      register: r_model_svc

    - name: Confirm model service is available
      ansible.builtin.debug:
        msg: >-
          Model service qwen3-4b-instruct-kserve-workload-svc is
          {{ 'available' if r_model_svc.resources | length > 0 else 'NOT found — check llm namespace' }}
          in the llm namespace. This is a read-only exploration module;
          no resources need to be created.
