---
- name: Module 5 Solve — System Administration with Agentic AI
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    model_internal_url: "https://nemotron-3-nano-30b-a3b-kserve-workload-svc.llm.svc.cluster.local:8000"
    ocp_mcp_url: "http://ocp-mcp-server.lls-demo.svc.cluster.local:8080/mcp"
    rc_mcp_url: "http://rocketchat-mcp.lls-demo.svc.cluster.local:80/mcp"
    tier_namespace: "maas-default-gateway-tier-enterprise"
    gateway_audience: "maas-default-gateway-sa"
    model_name: "nemotron-3-nano-30b-a3b"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable
    # -------------------------------------------------------
    - name: Verify nemotron model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Check OCP MCP server (TCP)
    # -------------------------------------------------------
    - name: Check OCP MCP server is reachable
      ansible.builtin.wait_for:
        host: "ocp-mcp-server.lls-demo.svc.cluster.local"
        port: 8080
        timeout: 5
      register: r_ocp_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Check Rocket.Chat MCP server (TCP)
    # -------------------------------------------------------
    - name: Check Rocket.Chat MCP server is reachable
      ansible.builtin.wait_for:
        host: "rocketchat-mcp.lls-demo.svc.cluster.local"
        port: 80
        timeout: 5
      register: r_rocketchat_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Check Llama Stack playground pod is running
    # -------------------------------------------------------
    - name: Check lsd-genai-playground pod in student namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ student_user }}"
        label_selectors:
          - "app=llama-stack"
      register: r_playground_pod
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Verify RocketChat user credentials exist
    # -------------------------------------------------------
    - name: Check RocketChat user credentials secret
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: v1
        kind: Secret
        name: rocketchat-user-credentials
        namespace: "wksp-{{ student_user }}"
      register: r_rocketchat_creds
      ignore_errors: true

    # -------------------------------------------------------
    # Task 6 — Get Llama Stack pod name to exec into it
    # -------------------------------------------------------
    - name: Get Llama Stack pod name
      ansible.builtin.set_fact:
        llama_pod: "{{ (r_playground_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_playground_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 7 — Chat with Llama Stack (proves model works)
    # -------------------------------------------------------
    - name: Chat with Llama Stack — test model connectivity
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}"
        pod: "{{ llama_pod }}"
        command: "curl -s -X POST http://localhost:8321/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\":\"maas-vllm-inference-1/nemotron-3-nano-30b-a3b\",\"messages\":[{\"role\":\"user\",\"content\":\"Say hello in one sentence.\"}],\"max_tokens\":50,\"stream\":false}'"
      register: r_llama_chat
      when: llama_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 8 — OCP MCP: list pods in grafana namespace
    #   and post the result to RocketChat #workshop via RC MCP
    # -------------------------------------------------------
    - name: "OCP MCP: list grafana pods → RC MCP: post to #workshop"
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}"
        pod: "{{ llama_pod }}"
        command: >-
          sh -c '
          OCP_MCP="{{ ocp_mcp_url }}";
          RC_MCP="{{ rc_mcp_url }}";

          OCP_SESSION=$(curl -s -v -X POST $OCP_MCP
          -H "Content-Type: application/json"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"solve\",\"version\":\"1.0\"}},\"id\":1}"
          2>&1 | grep "Mcp-Session-Id:" | sed "s/.*Mcp-Session-Id: //;s/\r//");

          curl -s -X POST $OCP_MCP
          -H "Content-Type: application/json"
          -H "Mcp-Session-Id: $OCP_SESSION"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"pods_list_in_namespace\",\"arguments\":{\"namespace\":\"grafana\"}},\"id\":2}"
          > /tmp/ocp_pods_response.txt;

          python3 -c "
          import json
          with open(\"/tmp/ocp_pods_response.txt\") as f:
              raw = f.read()
          for line in raw.splitlines():
              if line.startswith(\"data: \"):
                  data = json.loads(line[6:])
                  break
          pod_text = data[\"result\"][\"content\"][0][\"text\"]
          msg = \"Pods in grafana namespace:\\n\" + pod_text
          payload = json.dumps({\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"send_message\",\"arguments\":{\"channel\":\"workshop\",\"text\":msg}},\"id\":2})
          with open(\"/tmp/rc_pods_payload.json\",\"w\") as f:
              f.write(payload)
          ";

          RC_SESSION=$(curl -s -v -X POST $RC_MCP
          -H "Content-Type: application/json"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"solve\",\"version\":\"1.0\"}},\"id\":1}"
          2>&1 | grep "Mcp-Session-Id:" | sed "s/.*Mcp-Session-Id: //;s/\r//");

          curl -s -X POST $RC_MCP
          -H "Content-Type: application/json"
          -H "Mcp-Session-Id: $RC_SESSION"
          -d @/tmp/rc_pods_payload.json
          '
      register: r_mcp_pods_to_rc
      when: llama_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 9 — OCP MCP: get grafana pod logs
    #   and post to RocketChat #workshop via RC MCP
    # -------------------------------------------------------
    - name: "OCP MCP: get grafana logs → RC MCP: post to #workshop"
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}"
        pod: "{{ llama_pod }}"
        command: >-
          sh -c '
          OCP_MCP="{{ ocp_mcp_url }}";
          RC_MCP="{{ rc_mcp_url }}";

          GRAFANA_POD=$(cat /tmp/ocp_pods_response.txt | sed -n "s/^data: //p" | python3 -c "
          import sys,json,re
          d=json.load(sys.stdin)
          t=d[\"result\"][\"content\"][0][\"text\"]
          m=re.search(r\"grafana-deployment-[a-z0-9-]+\",t)
          print(m.group(0) if m else \"\")
          ");

          OCP_SESSION=$(curl -s -v -X POST $OCP_MCP
          -H "Content-Type: application/json"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"solve\",\"version\":\"1.0\"}},\"id\":1}"
          2>&1 | grep "Mcp-Session-Id:" | sed "s/.*Mcp-Session-Id: //;s/\r//");

          curl -s -X POST $OCP_MCP
          -H "Content-Type: application/json"
          -H "Mcp-Session-Id: $OCP_SESSION"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"pods_log\",\"arguments\":{\"name\":\"$GRAFANA_POD\",\"namespace\":\"grafana\",\"tail\":15}},\"id\":2}"
          > /tmp/ocp_logs_response.txt;

          python3 -c "
          import json
          with open(\"/tmp/ocp_logs_response.txt\") as f:
              raw = f.read()
          for line in raw.splitlines():
              if line.startswith(\"data: \"):
                  data = json.loads(line[6:])
                  break
          log_text = data[\"result\"][\"content\"][0][\"text\"]
          msg = \"Grafana pod logs ({{ student_user }}):\\n\" + log_text[:500]
          payload = json.dumps({\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"send_message\",\"arguments\":{\"channel\":\"workshop\",\"text\":msg}},\"id\":2})
          with open(\"/tmp/rc_logs_payload.json\",\"w\") as f:
              f.write(payload)
          ";

          RC_SESSION=$(curl -s -v -X POST $RC_MCP
          -H "Content-Type: application/json"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"solve\",\"version\":\"1.0\"}},\"id\":1}"
          2>&1 | grep "Mcp-Session-Id:" | sed "s/.*Mcp-Session-Id: //;s/\r//");

          curl -s -X POST $RC_MCP
          -H "Content-Type: application/json"
          -H "Mcp-Session-Id: $RC_SESSION"
          -d @/tmp/rc_logs_payload.json
          '
      register: r_mcp_logs_to_rc
      when: llama_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 10 — RC MCP: list channels (matches lab step)
    # -------------------------------------------------------
    - name: "RC MCP: list channels"
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}"
        pod: "{{ llama_pod }}"
        command: >-
          sh -c '
          RC_MCP="{{ rc_mcp_url }}";
          RC_SESSION=$(curl -s -v -X POST $RC_MCP
          -H "Content-Type: application/json"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"solve\",\"version\":\"1.0\"}},\"id\":1}"
          2>&1 | grep "Mcp-Session-Id:" | sed "s/.*Mcp-Session-Id: //;s/\r//");
          curl -s -X POST $RC_MCP
          -H "Content-Type: application/json"
          -H "Mcp-Session-Id: $RC_SESSION"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"list_channels\",\"arguments\":{}},\"id\":2}"
          '
      register: r_mcp_channels
      when: llama_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 11 — RC MCP: post "Hi from <user>" to #workshop
    # -------------------------------------------------------
    - name: "RC MCP: post Hi message to #workshop"
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}"
        pod: "{{ llama_pod }}"
        command: >-
          sh -c '
          RC_MCP="{{ rc_mcp_url }}";
          RC_SESSION=$(curl -s -v -X POST $RC_MCP
          -H "Content-Type: application/json"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"solve\",\"version\":\"1.0\"}},\"id\":1}"
          2>&1 | grep "Mcp-Session-Id:" | sed "s/.*Mcp-Session-Id: //;s/\r//");
          curl -s -X POST $RC_MCP
          -H "Content-Type: application/json"
          -H "Mcp-Session-Id: $RC_SESSION"
          -d "{\"jsonrpc\":\"2.0\",\"method\":\"tools/call\",\"params\":{\"name\":\"send_message\",\"arguments\":{\"channel\":\"workshop\",\"text\":\"Hi from {{ student_user }}\"}},\"id\":2}"
          '
      register: r_mcp_rc_hi
      when: llama_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 12 — Send requests through MaaS gateway to generate
    #   Grafana metrics (authorized_hits in Limitador)
    #
    #   Discovers the student's SA in the tier namespace,
    #   creates a token, gets the gateway hostname, and sends
    #   chat completions through the external gateway.
    # -------------------------------------------------------
    - name: Get MaaS gateway hostname
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: gateway.networking.k8s.io/v1
        kind: Gateway
        name: maas-default-gateway
        namespace: openshift-ingress
      register: r_gateway
      ignore_errors: true

    - name: Set gateway hostname
      ansible.builtin.set_fact:
        gateway_host: "{{ r_gateway.resources[0].spec.listeners[0].hostname }}"
      when: r_gateway.resources | default([]) | length > 0
      ignore_errors: true

    - name: Find student SA in tier-enterprise namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: v1
        kind: ServiceAccount
        namespace: "{{ tier_namespace }}"
      register: r_tier_sas
      ignore_errors: true

    - name: Set student tier SA name
      ansible.builtin.set_fact:
        tier_sa: "{{ r_tier_sas.resources | default([]) | map(attribute='metadata.name') | select('match', student_user ~ '-') | first }}"
      when: r_tier_sas.resources | default([]) | length > 0
      ignore_errors: true

    - name: Create gateway token for student SA
      ansible.builtin.command:
        cmd: >-
          oc create token {{ tier_sa }}
          -n {{ tier_namespace }}
          --audience={{ gateway_audience }}
          --duration=600s
          {% if k8s_kubeconfig is defined %}--kubeconfig={{ k8s_kubeconfig }}{% endif %}
      register: r_gateway_token
      when: tier_sa is defined and gateway_host is defined
      ignore_errors: true

    - name: Send chat completions through MaaS gateway to generate metrics
      ansible.builtin.uri:
        url: "https://{{ gateway_host }}/llm/{{ model_name }}/v1/chat/completions"
        method: POST
        headers:
          Authorization: "Bearer {{ r_gateway_token.stdout }}"
          Content-Type: application/json
        body_format: json
        body:
          model: "{{ model_name }}"
          messages:
            - role: user
              content: "{{ item }}"
          max_tokens: 20
        return_content: true
        validate_certs: false
        timeout: 60
      register: r_gateway_chat
      loop:
        - "List all namespaces"
        - "How many pods are running in the cluster?"
        - "What is the cluster version?"
      when: r_gateway_token is defined and r_gateway_token is not failed
      ignore_errors: true

    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          OCP MCP server (lls-demo): {{ 'reachable' if r_ocp_mcp is not failed else 'NOT reachable' }}
          Rocket.Chat MCP server (lls-demo): {{ 'reachable' if r_rocketchat_mcp is not failed else 'NOT reachable' }}
          RocketChat user credentials: {{ 'found' if (r_rocketchat_creds.resources | default([]) | length > 0) else 'NOT found' }}
          Llama Stack playground ({{ student_user }}): {{ 'running' if llama_pod is defined else 'not found' }}
          Llama Stack chat: {{ 'completed' if (r_llama_chat is defined and r_llama_chat is not failed) else 'failed or skipped' }}
          OCP MCP → list pods → RC post: {{ 'completed' if (r_mcp_pods_to_rc is defined and r_mcp_pods_to_rc is not failed) else 'failed or skipped' }}
          OCP MCP → grafana logs → RC post: {{ 'completed' if (r_mcp_logs_to_rc is defined and r_mcp_logs_to_rc is not failed) else 'failed or skipped' }}
          RC MCP → list channels: {{ 'completed' if (r_mcp_channels is defined and r_mcp_channels is not failed) else 'failed or skipped' }}
          RC MCP → post Hi to #workshop: {{ 'completed' if (r_mcp_rc_hi is defined and r_mcp_rc_hi is not failed) else 'failed or skipped' }}
          MaaS gateway SA: {{ tier_sa | default('not found') }}
          MaaS gateway chat (3 requests): {{ 'completed' if (r_gateway_chat is defined and r_gateway_chat is not failed) else 'failed or skipped' }}
