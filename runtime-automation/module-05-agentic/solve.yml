---
- name: Module 5 Solve — System Administration with Agentic AI
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    model_internal_url: "https://nemotron-3-nano-30b-a3b-kserve-workload-svc.llm.svc.cluster.local:8000"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable
    # -------------------------------------------------------
    - name: Verify nemotron model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Check OCP MCP server (TCP — SSE endpoints stream forever)
    #   Shared namespace: lls-demo (all students share these MCP servers)
    # -------------------------------------------------------
    - name: Check OCP MCP server is reachable
      ansible.builtin.wait_for:
        host: "ocp-mcp-server.lls-demo.svc.cluster.local"
        port: 8080
        timeout: 5
      register: r_ocp_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Check Rocket.Chat MCP server (TCP)
    # -------------------------------------------------------
    - name: Check Rocket.Chat MCP server is reachable
      ansible.builtin.wait_for:
        host: "rocketchat-mcp.lls-demo.svc.cluster.local"
        port: 80
        timeout: 5
      register: r_rocketchat_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Check Llama Stack playground pod is running (k8s — direct API blocked by NetworkPolicy)
    # -------------------------------------------------------
    - name: Check lsd-genai-playground pod in student namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ student_user }}"
        label_selectors:
          - "app=llama-stack"
      register: r_playground_pod
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Verify RocketChat user credentials exist (created by setup job)
    # -------------------------------------------------------
    - name: Check RocketChat user credentials secret
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: v1
        kind: Secret
        name: rocketchat-user-credentials
        namespace: "wksp-{{ student_user }}"
      register: r_rocketchat_creds
      ignore_errors: true

    # -------------------------------------------------------
    # Task 6 — Get Llama Stack pod name to exec into it
    # -------------------------------------------------------
    - name: Get Llama Stack pod name
      ansible.builtin.set_fact:
        llama_pod: "{{ (r_playground_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_playground_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 7 — Chat with Llama Stack (correct model ID)
    # -------------------------------------------------------
    - name: Chat with Llama Stack — list pods in student workspace
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}"
        pod: "{{ llama_pod }}"
        command: "curl -s -X POST http://localhost:8321/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\":\"maas-vllm-inference-1/nemotron-3-nano-30b-a3b\",\"messages\":[{\"role\":\"user\",\"content\":\"List all pods in the wksp-{{ student_user }} namespace.\"}],\"max_tokens\":200,\"stream\":false}'"
      register: r_llama_chat
      when: llama_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 8 — Post to RocketChat via REST API (MCP tool calls
    #          only work through the Gen AI Studio Playground UI,
    #          so we post directly using the tenant credentials)
    # -------------------------------------------------------
    - name: Extract RocketChat credentials from secret
      ansible.builtin.set_fact:
        rc_auth_token: "{{ r_rocketchat_creds.resources[0].data['auth-token'] | b64decode }}"
        rc_user_id: "{{ r_rocketchat_creds.resources[0].data['user-id'] | b64decode }}"
        rc_url: "{{ r_rocketchat_creds.resources[0].data['rocketchat-url'] | b64decode }}"
      when: r_rocketchat_creds.resources | default([]) | length > 0
      ignore_errors: true

    - name: Post message to RocketChat #workshop channel
      ansible.builtin.uri:
        url: "{{ rc_url }}/api/v1/chat.postMessage"
        method: POST
        headers:
          X-Auth-Token: "{{ rc_auth_token }}"
          X-User-Id: "{{ rc_user_id }}"
          Content-Type: application/json
        body_format: json
        body:
          channel: "#workshop"
          text: "Hi from {{ student_user }} (automated solve)"
        return_content: true
        timeout: 10
      register: r_rocketchat_post
      when: rc_auth_token is defined
      ignore_errors: true

    - name: Post message to RocketChat #general channel
      ansible.builtin.uri:
        url: "{{ rc_url }}/api/v1/chat.postMessage"
        method: POST
        headers:
          X-Auth-Token: "{{ rc_auth_token }}"
          X-User-Id: "{{ rc_user_id }}"
          Content-Type: application/json
        body_format: json
        body:
          channel: "#general"
          text: "Hi from {{ student_user }} (automated solve)"
        return_content: true
        timeout: 10
      register: r_rocketchat_general
      when: rc_auth_token is defined
      ignore_errors: true

    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          OCP MCP server (lls-demo): {{ 'reachable' if r_ocp_mcp is not failed else 'NOT reachable' }}
          Rocket.Chat MCP server (lls-demo): {{ 'reachable' if r_rocketchat_mcp is not failed else 'NOT reachable' }}
          RocketChat user credentials: {{ 'found' if (r_rocketchat_creds.resources | default([]) | length > 0) else 'NOT found — setup job may have failed' }}
          Llama Stack playground ({{ student_user }}): {{ 'running' if llama_pod is defined else 'not found' }}
          Llama Stack chat (list pods): {{ 'completed' if r_llama_chat is not failed else 'failed' }}
          RocketChat #workshop post: {{ 'sent' if (r_rocketchat_post is defined and r_rocketchat_post.status | default(0) == 200) else 'failed' }}
          RocketChat #general post: {{ 'sent' if (r_rocketchat_general is defined and r_rocketchat_general.status | default(0) == 200) else 'failed' }}
