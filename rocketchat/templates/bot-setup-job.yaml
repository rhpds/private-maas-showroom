{{- if .Values.botUser.enabled }}
---
# ServiceAccount for the job to create secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "rocketchat.fullname" . }}-bot-setup
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
---
# Role to create/update secrets in MCP namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "rocketchat.fullname" . }}-bot-setup
  namespace: {{ .Values.botUser.mcpNamespace }}
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "rocketchat.fullname" . }}-bot-setup
  namespace: {{ .Values.botUser.mcpNamespace }}
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "rocketchat.fullname" . }}-bot-setup
subjects:
- kind: ServiceAccount
  name: {{ template "rocketchat.fullname" . }}-bot-setup
  namespace: {{ .Release.Namespace }}
---
# Job to create bot user and token
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "rocketchat.fullname" . }}-bot-setup
  labels:
    {{- include "rocketchat.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      name: {{ template "rocketchat.fullname" . }}-bot-setup
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ template "rocketchat.fullname" . }}-bot-setup
      containers:
      - name: setup-bot
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          RC_URL="{{ .Values.botUser.rocketchatUrl }}"
          ADMIN_USER="{{ .Values.botUser.adminUsername }}"
          ADMIN_PASS="{{ .Values.botUser.adminPassword }}"
          BOT_USERNAME="{{ .Values.botUser.username }}"
          BOT_NAME="{{ .Values.botUser.name }}"
          BOT_EMAIL="{{ .Values.botUser.email }}"
          BOT_PASS="{{ .Values.botUser.password }}"
          SECRET_NAME="{{ .Values.botUser.secretName }}"
          MCP_NAMESPACE="{{ .Values.botUser.mcpNamespace }}"

          # Wait for Rocket.Chat to be ready
          echo "Waiting for Rocket.Chat to be ready..."
          MAX_RETRIES=60
          RETRY_COUNT=0
          until curl -sf "$RC_URL/api/info" > /dev/null 2>&1; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "ERROR: Rocket.Chat did not become ready in time"
              exit 1
            fi
            echo "Rocket.Chat not ready yet, waiting 5s... ($RETRY_COUNT/$MAX_RETRIES)"
            sleep 5
          done
          echo "✓ Rocket.Chat is ready!"

          # Login as admin
          echo "Logging in as admin user: $ADMIN_USER..."
          LOGIN_RESPONSE=$(curl -s -X POST "$RC_URL/api/v1/login" \
            -H "Content-Type: application/json" \
            -d "{\"user\":\"$ADMIN_USER\",\"password\":\"$ADMIN_PASS\"}")

          AUTH_TOKEN=$(echo "$LOGIN_RESPONSE" | grep -o '"authToken":"[^"]*"' | cut -d'"' -f4)
          ADMIN_ID=$(echo "$LOGIN_RESPONSE" | grep -o '"userId":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$AUTH_TOKEN" ]; then
            echo "ERROR: Failed to login as admin"
            echo "Response: $LOGIN_RESPONSE"
            exit 1
          fi
          echo "✓ Admin login successful (User ID: $ADMIN_ID)"

          # Check if bot user exists
          echo "Checking if bot user exists: $BOT_USERNAME..."
          USER_INFO_RESPONSE=$(curl -s -X GET "$RC_URL/api/v1/users.info?username=$BOT_USERNAME" \
            -H "X-Auth-Token: $AUTH_TOKEN" \
            -H "X-User-Id: $ADMIN_ID")

          BOT_USER_ID=$(echo "$USER_INFO_RESPONSE" | grep -o '"_id":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -z "$BOT_USER_ID" ]; then
            # Create bot user
            echo "Creating bot user: $BOT_USERNAME..."
            CREATE_RESPONSE=$(curl -s -X POST "$RC_URL/api/v1/users.create" \
              -H "X-Auth-Token: $AUTH_TOKEN" \
              -H "X-User-Id: $ADMIN_ID" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\":\"$BOT_NAME\",
                \"email\":\"$BOT_EMAIL\",
                \"password\":\"$BOT_PASS\",
                \"username\":\"$BOT_USERNAME\",
                \"roles\":[\"bot\"],
                \"joinDefaultChannels\":true
              }")

            BOT_USER_ID=$(echo "$CREATE_RESPONSE" | grep -o '"_id":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ -z "$BOT_USER_ID" ]; then
              echo "ERROR: Failed to create bot user"
              echo "Response: $CREATE_RESPONSE"
              exit 1
            fi
            echo "✓ Bot user created successfully"
          else
            echo "✓ Bot user already exists"
          fi
          echo "Bot User ID: $BOT_USER_ID"

          # Login as bot user to get auth token
          echo "Logging in as bot user to generate auth token..."
          BOT_LOGIN_RESPONSE=$(curl -s -X POST "$RC_URL/api/v1/login" \
            -H "Content-Type: application/json" \
            -d "{\"user\":\"$BOT_USERNAME\",\"password\":\"$BOT_PASS\"}")

          TOKEN_RESPONSE="$BOT_LOGIN_RESPONSE"

          BOT_TOKEN=$(echo "$TOKEN_RESPONSE" | grep -o '"authToken":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$BOT_TOKEN" ]; then
            echo "ERROR: Failed to create bot token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi
          echo "✓ Bot token created successfully"

          # Create secret in MCP namespace
          echo "Creating Kubernetes secret: $SECRET_NAME in namespace: $MCP_NAMESPACE..."
          kubectl create secret generic "$SECRET_NAME" \
            --from-literal=auth-token="$BOT_TOKEN" \
            --from-literal=user-id="$BOT_USER_ID" \
            --namespace="$MCP_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

          if [ $? -eq 0 ]; then
            echo "✓ Secret created successfully!"
          else
            echo "ERROR: Failed to create secret"
            exit 1
          fi

          {{- if .Values.botUser.createWorkshopChannel }}
          # Create workshop channel
          echo ""
          echo "Creating workshop channel..."
          CHANNEL_NAME="{{ .Values.botUser.workshopChannelName }}"

          # Check if channel exists
          CHANNEL_INFO=$(curl -s -X GET "$RC_URL/api/v1/channels.info?roomName=$CHANNEL_NAME" \
            -H "X-Auth-Token: $AUTH_TOKEN" \
            -H "X-User-Id: $ADMIN_ID")

          CHANNEL_ID=$(echo "$CHANNEL_INFO" | grep -o '"_id":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -z "$CHANNEL_ID" ]; then
            # Create the channel
            echo "Creating #$CHANNEL_NAME channel..."
            CREATE_CHANNEL=$(curl -s -X POST "$RC_URL/api/v1/channels.create" \
              -H "X-Auth-Token: $AUTH_TOKEN" \
              -H "X-User-Id: $ADMIN_ID" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\":\"$CHANNEL_NAME\",
                \"members\":[\"$BOT_USER_ID\"],
                \"topic\":\"{{ .Values.botUser.workshopChannelTopic }}\",
                \"description\":\"{{ .Values.botUser.workshopChannelDescription }}\"
              }")

            CHANNEL_ID=$(echo "$CREATE_CHANNEL" | grep -o '"_id":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ -z "$CHANNEL_ID" ]; then
              echo "⚠ Warning: Failed to create channel #$CHANNEL_NAME"
              echo "Response: $CREATE_CHANNEL"
            else
              echo "✓ Channel #$CHANNEL_NAME created (ID: $CHANNEL_ID)"

              # Make it a default channel so all users auto-join
              echo "  Setting #$CHANNEL_NAME as default channel (all users auto-join)..."
              curl -s -X POST "$RC_URL/api/v1/channels.setDefault" \
                -H "X-Auth-Token: $AUTH_TOKEN" \
                -H "X-User-Id: $ADMIN_ID" \
                -H "Content-Type: application/json" \
                -d "{\"roomId\":\"$CHANNEL_ID\",\"default\":true}" > /dev/null
              echo "  ✓ All users will auto-join #$CHANNEL_NAME"

              # Post welcome message
              {{- if .Values.botUser.workshopWelcomeMessage }}
              echo "  Posting welcome message..."
              curl -s -X POST "$RC_URL/api/v1/chat.postMessage" \
                -H "X-Auth-Token: $AUTH_TOKEN" \
                -H "X-User-Id: $ADMIN_ID" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"#$CHANNEL_NAME\",\"text\":\"{{ .Values.botUser.workshopWelcomeMessage }}\"}" > /dev/null
              echo "  ✓ Welcome message posted"
              {{- end }}
            fi
          else
            echo "✓ Channel #$CHANNEL_NAME already exists (ID: $CHANNEL_ID)"
          fi
          {{- end }}

          echo ""
          echo "═══════════════════════════════════════════"
          echo "  Bot Setup Complete!"
          echo "═══════════════════════════════════════════"
          echo "  Bot Username: $BOT_USERNAME"
          echo "  Bot User ID:  $BOT_USER_ID"
          echo "  Secret:       $SECRET_NAME"
          echo "  Namespace:    $MCP_NAMESPACE"
          {{- if .Values.botUser.createWorkshopChannel }}
          echo "  Workshop Ch:  #{{ .Values.botUser.workshopChannelName }}"
          {{- end }}
          echo "═══════════════════════════════════════════"
{{- end }}
