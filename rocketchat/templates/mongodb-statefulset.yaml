{{- if not .Values.mongodb.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rocketchat.fullname" . }}-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rocketchat.fullname" . }}-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ include "rocketchat.fullname" . }}-mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext: {}
      containers:
        - name: mongodb
          image: "docker.io/library/mongo:8.2.6"
          imagePullPolicy: IfNotPresent
          securityContext: {}
          ports:
            - name: mongodb
              containerPort: 27017
          env: []
          command:
            - bash
            - -c
          args:
            - |
              set -e
              # Get the pod's FQDN
              POD_NAME=$(hostname)
              SERVICE_NAME="{{ include "rocketchat.fullname" . }}-mongodb"
              NAMESPACE="{{ .Release.Namespace }}"
              FQDN="${POD_NAME}.${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local:27017"

              # Start MongoDB in background
              mongod --bind_ip_all --replSet rs0 &
              MONGO_PID=$!

              # Wait for MongoDB to be ready
              until mongosh --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
                echo "Waiting for MongoDB to start..."
                sleep 2
              done

              # Initialize replica set if not already initialized
              if ! mongosh --eval "rs.status()" > /dev/null 2>&1; then
                echo "Initializing replica set with host: ${FQDN}"
                mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: '${FQDN}'}]})"
              fi

              # Wait for MongoDB process
              wait $MONGO_PID
          volumeMounts:
            - name: datadir
              mountPath: /data/db
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mongodb.storage.storageClassName }}
        storageClassName: {{ .Values.mongodb.storage.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongodb.storage.requests | default "5Gi" }}
{{- end }}
