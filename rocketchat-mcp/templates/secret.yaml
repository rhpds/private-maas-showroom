{{- if not .Values.rocketchat.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rocketchat-mcp.fullname" . }}
  labels:
    {{- include "rocketchat-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  auth-token: {{ .Values.rocketchat.authToken | b64enc | quote }}
  user-id: {{ .Values.rocketchat.userId | b64enc | quote }}
{{- end }}
