apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rocketchat-mcp.fullname" . }}
  labels:
    {{- include "rocketchat-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rocketchat-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rocketchat-mcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: rocketchat-mcp-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: MCP_PORT
          value: {{ quote .Values.service.targetPort }}
        - name: ROCKETCHAT_URL
          value: {{ .Values.rocketchat.url | quote }}
        - name: ROCKETCHAT_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "rocketchat-mcp.secretName" . }}
              key: auth-token
        - name: ROCKETCHAT_USER_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "rocketchat-mcp.secretName" . }}
              key: user-id
        {{- if .Values.rocketchat.readOnly }}
        - name: READ_ONLY
          value: "true"
        {{- end }}
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
